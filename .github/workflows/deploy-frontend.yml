name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'WEb_cat_frontend/**'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd WEb_cat_frontend
          npm ci

      - name: Build
        run: |
          cd WEb_cat_frontend
          npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./WEb_cat_frontend/dist
          publish_branch: gh-pages
