app:
  name: cat-ai-backend
  version: 1.0.0
  debug: true
  host: 0.0.0.0
  port: 8000

database:
  mysql:
    host: localhost
    port: 3306
    database: cat_ai
    username: root
    password: cat_ai
    pool_size: 20
    max_overflow: 30

  redis:
    host: localhost
    port: 6379
    db: 0
    password: null
    decode_responses: true

ai:
  text_model:
    type: "glm4"  # openai, glm4, claude, ernie, etc.
    api_key: "${ARK_API_KEY}"
    model: "glm-4-7-251222"
    temperature: 0.7

  vision_model:
    type: "clip"    # clip, ernie-vil, qwen-v, etc.
    model_path: "./models/clip"
    similarity_threshold: 0.8
    max_results: 5

cache:
  default_ttl: 3600
  ai_response_ttl: 1800
  cat_stats_ttl: 300

rate_limit:
  chat: "100/minute"
  recognition: "20/minute"
  default: "1000/hour"